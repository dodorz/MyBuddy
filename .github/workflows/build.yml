name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (v1.2.3 or 1.2.3)"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "*.*.*"

jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ inputs.version }}") {
            $tag = "${{ inputs.version }}"
          } else {
            $header = Get-Content src/version.h -Raw
            if ($header -match 'MYBUDDY_VERSION_STRING\s+L"([^"]+)"') {
              $tag = $Matches[1]
            } else {
              throw "Could not resolve version from src/version.h"
            }
          }
          if (-not $tag) {
            throw "Resolved version is empty"
          }
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Configure
        run: cmake -S . -B build\vs2026 -G "Visual Studio 18 2026" -A x64

      - name: Build
        run: |
          cmake --build build\vs2026 --config Debug
          cmake --build build\vs2026 --config Release

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $debugZip = "MyBuddy-v$version-windows-x64-Debug.zip"
          $releaseZip = "MyBuddy-v$version-windows-x64-Release.zip"
          $root = Join-Path $PWD "package"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          Copy-Item -Path "build\vs2026\Debug\MyBuddy.exe" -Destination (Join-Path $root "MyBuddy-Debug.exe")
          Copy-Item -Path "build\vs2026\Release\MyBuddy.exe" -Destination (Join-Path $root "MyBuddy-Release.exe")
          Compress-Archive -Path (Join-Path $root "MyBuddy-Debug.exe") -DestinationPath $debugZip -Force
          Compress-Archive -Path (Join-Path $root "MyBuddy-Release.exe") -DestinationPath $releaseZip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBuddy
          path: |
            MyBuddy-v*-windows-x64-Debug.zip
            MyBuddy-v*-windows-x64-Release.zip
