name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (v1.2.3 or 1.2.3)"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ inputs.version }}") {
            $tag = "${{ inputs.version }}"
          } else {
            $header = Get-Content src/version.h -Raw
            if ($header -match 'MYBUDDY_VERSION_STRING\s+L"([^"]+)"') {
              $tag = $Matches[1]
            } else {
              throw "Could not resolve version from src/version.h"
            }
          }
          if (-not $tag) {
            throw "Resolved version is empty"
          }
          $version = $tag
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Configure
        run: cmake -S . -B build\vs2026 -G "Visual Studio 18 2026" -A x64

      - name: Build
        run: |
          cmake --build build\vs2026 --config Debug
          cmake --build build\vs2026 --config Release

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $debugZip = "MyBuddy-v$version-windows-x64-Debug.zip"
          $releaseZip = "MyBuddy-v$version-windows-x64.zip"
          $debugRoot = Join-Path $PWD "package\Debug"
          $releaseRoot = Join-Path $PWD "package\Release"
          New-Item -ItemType Directory -Force -Path $debugRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $releaseRoot | Out-Null
          Copy-Item -Path "build\vs2026\Debug\MyBuddy.exe" -Destination (Join-Path $debugRoot "MyBuddy-Debug.exe")
          Copy-Item -Path "build\vs2026\Release\MyBuddy.exe" -Destination (Join-Path $releaseRoot "MyBuddy.exe")
          Compress-Archive -Path (Join-Path $debugRoot "MyBuddy-Debug.exe") -DestinationPath $debugZip -Force
          Compress-Archive -Path (Join-Path $releaseRoot "MyBuddy.exe") -DestinationPath $releaseZip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBuddy
          path: |
            MyBuddy-v*-windows-x64-Debug.zip
            MyBuddy-v*-windows-x64.zip

      - name: Generate release notes
        if: github.event_name == 'push'
        id: release_notes
        shell: pwsh
        run: |
          $currentTag = "${{ steps.version.outputs.tag }}"
          $previousTag = ""
          try {
            $previousTag = (git describe --tags --abbrev=0 HEAD^ 2>$null).Trim()
          } catch {
            $previousTag = ""
          }

          $lines = @()
          if ($previousTag) {
            $lines += "Changes since $previousTag"
            $lines += ""
            $commitLines = git log "$previousTag..HEAD" --pretty=format:"- %s"
          } else {
            $lines += "Changes in $currentTag"
            $lines += ""
            $commitLines = git log HEAD --pretty=format:"- %s"
          }

          if ($commitLines) {
            $lines += $commitLines
          } else {
            $lines += "- No commit messages found."
          }

          $notesPath = Join-Path $PWD "release-notes.md"
          Set-Content -Path $notesPath -Value $lines -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MyBuddy v${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            MyBuddy-v*-windows-x64.zip
